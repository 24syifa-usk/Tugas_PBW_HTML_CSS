<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Contoh Internal CSS</title>
    <style>
        /* CSS ditulis langsung di sini */
        body {
            background-color: rgba(114, 95, 95, 0.795);
            /*font-family: Arial, sans-serif;*/
            margin: 0;
            /*height: 100vh;*/
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            color: #d68a8a;
            text-align:center;
            height: 70vh;
            font: weight 1200px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        p {
            color:#d68a8a;
            line-height: 1.5;
            /*height: 100vh;*/
            text-align: center; /* Ubah dari 'end' ke 'center' */
            max-width: 400px; /* Biar teksnya tidak terlalu lebar */
            font-weight: 600;
            font-family: Verdana, Geneva, Tahoma, sans-serif;

        }
    </style>
</head>
<body>
    <h1>Hai! aku Syifa!!</h1>
    <p>Seorang mahasiswi IT yang tertarik banyak hal pada dunia teknologi dan suka mengeksplor <br> Salam kenal yah :D</p>

</html>
